# VoiceTyping-friendly tmux config for mobile
set -g mouse on
set -g history-limit 10000
set -g status-style 'bg=#1a1a2e fg=#eee'
set -g status-left '#[fg=#e94560]#S '
set -g status-right '%H:%M'
set -g base-index 1
setw -g pane-base-index 1
# Larger font-friendly: wider status bar
set -g status-left-length 20
